name: Build and Release

on:
  push:
    tags:
      - 'v*'   # Executa quando uma tag com v (ex: v1.0.0) for pushada

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt  # Crie um requirements.txt com suas dependências

    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name "SistemaEngelmig" --add-data "resources/modelo.docx;resources" app.py

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/SistemaEngelmig.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
